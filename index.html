<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Officer Attendance</title>

<style>
body{
    margin:0;
    font-family:Inter,Arial,sans-serif;
    background:radial-gradient(circle at top,#0f3d2e,#06281f);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:95%;
    max-width:420px;
    background:rgba(18,70,52,.85);
    backdrop-filter:blur(14px);
    padding:32px 26px;
    border-radius:20px;
    box-shadow:0 30px 60px rgba(0,0,0,.45);
}

h1{
    color:white;
    text-align:center;
    margin-bottom:25px;
}

input,select{
    width:100%;
    padding:15px;
    margin-bottom:18px;
    border:none;
    border-radius:14px;
    box-sizing:border-box;
    font-size:15px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#34d399,#059669);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:disabled{
    opacity:.6;
}

#msg{
    margin-top:18px;
    text-align:center;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>Officer Attendance</h1>

<input
type="text"
id="name"
placeholder="Enter your name"
autocomplete="off">

<select id="status">
<option value="Present">Present</option>
<option value="Excused">Excused</option>
</select>

<button id="submitBtn">
Submit Attendance
</button>

<div id="msg"></div>

</div>

<script>

const WEB_APP_URL = "https://manattendance.yesosnnhs26.workers.dev/";

document
.getElementById("submitBtn")
.addEventListener("click", addAttendance);

async function addAttendance(){

    const name=document.getElementById("name").value.trim();
    const status=document.getElementById("status").value;
    const btn=document.getElementById("submitBtn");
    const msg=document.getElementById("msg");

    if(!name){
        alert("Please enter your name.");
        return;
    }

    btn.disabled=true;
    btn.textContent="Submitting...";
    msg.textContent="";

    const payload={
        name:name,
        status:status,
        date:new Date().toLocaleDateString(),
        time:new Date().toLocaleTimeString()
    };

    console.log("Sending JSON:",payload);

    try{

        const response=await fetch(WEB_APP_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(payload)
        });

        const result=await response.json();

        console.log(result);

        if(result.success){

            msg.innerHTML="✅ Attendance Recorded!";
            document.getElementById("name").value="";

        }else{

            msg.innerHTML="❌ "+result.message;

        }

    }catch(err){

        console.error(err);
        msg.innerHTML="❌ "+err.message;

    }

    btn.disabled=false;
    btn.textContent="Submit Attendance";

}

</script>

</body>
</html>
