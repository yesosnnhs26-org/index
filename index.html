<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Officer Attendance</title>

<style>
  body {
    margin: 0;
    font-family: "Inter", Arial, sans-serif;
    background: radial-gradient(circle at top, #0f3d2e, #06281f);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    width: 95%;
    max-width: 420px;
    background: rgba(18, 70, 52, 0.85);
    backdrop-filter: blur(14px);
    padding: 32px 26px;
    border-radius: 20px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.45);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .container:hover {
    transform: translateY(-4px);
    box-shadow: 0 35px 70px rgba(0,0,0,0.55);
  }

  h1 {
    text-align: center;
    margin-bottom: 26px;
    font-size: 22px;
    color: #eafff4;
    letter-spacing: 0.6px;
  }

  input, select {
    width: 100%;
    padding: 15px 16px;
    margin-bottom: 18px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    background: rgba(240,255,250,0.95);
    box-sizing: border-box;
    transition: box-shadow 0.25s ease, transform 0.2s ease;
  }

  input:focus, select:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(72, 255, 168, 0.5);
    transform: scale(1.01);
  }

  button {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, #34d399, #059669);
    color: #ffffff;
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s;
  }

  button:hover {
    box-shadow: 0 10px 25px rgba(52, 211, 153, 0.45);
  }

  button:active {
    transform: scale(0.97);
  }

  button.loading {
    opacity: 0.7;
    pointer-events: none;
  }

  #msg {
    margin-top: 16px;
    text-align: center;
    font-size: 14px;
    color: #d1fae5;
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.3s ease;
  }

  #msg.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>

<body>

<div class="container">
  <h1>Officer Attendance</h1>

  <input type="text" id="name" placeholder="Enter your name">

  <select id="status">
    <option value="Present">Present</option>
    <option value="Excused">Excused</option>
  </select>

  <button id="submitBtn" onclick="addAttendance()">Submit Attendance</button>

  <div id="msg"></div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyFyFdRVKfBRVX7a09WZ8h0w8QZ7GE0jrQI7wu3FjjcKDC662OkJgX2nUvnUId72m-S2Q/exec";

async function addAttendance() {

    const name = document.getElementById("name").value.trim();
    const status = document.getElementById("status").value;
    const msg = document.getElementById("msg");
    const btn = document.getElementById("submitBtn");

    if (!name) {
        alert("Please enter your name.");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Submitting...";

    msg.classList.remove("show");

    const now = new Date();

    try {

        const response = await fetch(WEB_APP_URL, {
            method: "POST",
            const formData = new FormData();

formData.append("name", name);
formData.append("status", status);
formData.append("date", now.toLocaleDateString());
formData.append("time", now.toLocaleTimeString());

const response = await fetch(WEB_APP_URL, {
    method: "POST",
    body: formData
});
        });

        const result = await response.json();

        if(result.success){

            msg.innerText = "✅ Attendance recorded successfully!";
            document.getElementById("name").value = "";

        }else{

            msg.innerText = "❌ " + result.message;

        }

    } catch(err){

        console.error(err);
        msg.innerText = "❌ Error submitting attendance.";

    }

    msg.classList.add("show");

    btn.disabled = false;
    btn.innerText = "Submit Attendance";

}
</script>
  
</body>

</html>
