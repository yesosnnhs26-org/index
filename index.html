<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Officer Attendance</title>

<style>
body{
    margin:0;
    font-family:Inter,Arial,sans-serif;
    background:radial-gradient(circle at top,#0f3d2e,#06281f);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:95%;
    max-width:420px;
    background:rgba(18,70,52,.85);
    backdrop-filter:blur(14px);
    padding:32px 26px;
    border-radius:20px;
    box-shadow:0 30px 60px rgba(0,0,0,.45);
}

h1{
    text-align:center;
    color:#eafff4;
    margin-bottom:24px;
}

input,select{
    width:100%;
    padding:15px;
    margin-bottom:18px;
    border:none;
    border-radius:14px;
    font-size:15px;
    box-sizing:border-box;
    background:white;
}

input:focus,
select:focus{
    outline:none;
    box-shadow:0 0 0 3px rgba(52,211,153,.45);
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    font-size:16px;
    font-weight:600;
    color:white;
    cursor:pointer;
    background:linear-gradient(135deg,#34d399,#059669);
}

button.loading{
    opacity:.7;
    pointer-events:none;
}

#msg{
    margin-top:18px;
    text-align:center;
    color:#d1fae5;
    opacity:0;
    transition:.3s;
}

#msg.show{
    opacity:1;
}
</style>

</head>
<body>

<div class="container">

<h1>Officer Attendance</h1>

<input
type="text"
id="name"
placeholder="Enter your name">

<select id="status">
    <option value="Present">Present</option>
    <option value="Excused">Excused</option>
</select>

<button id="submitBtn">
    Submit Attendance
</button>

<div id="msg"></div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbySyoK2yFjBqlSvTXleAG4uoShp1d40j_prVHUoDcukdfYHUY4RLfNsv_udXVk_9oLc4Q/exec";

document
.getElementById("submitBtn")
.addEventListener("click", addAttendance);

function addAttendance(){

    const name=document.getElementById("name").value.trim();
    const status=document.getElementById("status").value;
    const msg=document.getElementById("msg");
    const btn=document.getElementById("submitBtn");

    if(name===""){
        alert("Please enter your name.");
        return;
    }

    btn.classList.add("loading");
    btn.textContent="Submitting...";

    msg.classList.remove("show");

    const now=new Date();

    const data={
        name:name,
        status:status,
        date:now.toISOString().split("T")[0],
        time:now.toLocaleTimeString()
    };

    fetch(WEB_APP_URL,{
        method:"POST",
        headers:{
            "Content-Type":"text/plain;charset=utf-8"
        },
        body:JSON.stringify(data)
    })

    .then(response=>response.text())

    .then(text=>{

        console.log("Server Response:",text);

        let result;

        try{
            result=JSON.parse(text);
        }
        catch(error){
            throw new Error("Server returned invalid JSON:\n"+text);
        }

        if(result.success){

            msg.textContent="✅ Attendance recorded successfully!";
            document.getElementById("name").value="";

        }else{

            msg.textContent="❌ "+(result.message || "Unknown error.");

        }

        msg.classList.add("show");

    })

    .catch(error=>{

        console.error(error);

        msg.textContent="❌ "+error.message;
        msg.classList.add("show");

    })

    .finally(()=>{

        btn.classList.remove("loading");
        btn.textContent="Submit Attendance";

    });

}

</script>

</body>
</html>
