<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Officer Attendance</title>

<style>
body {
    margin: 0;
    font-family: "Inter", Arial, sans-serif;
    background: radial-gradient(circle at top, #0f3d2e, #06281f);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 95%;
    max-width: 420px;
    background: rgba(18,70,52,.85);
    backdrop-filter: blur(14px);
    padding: 32px 26px;
    border-radius: 20px;
    box-shadow: 0 30px 60px rgba(0,0,0,.45);
}

h1{
    text-align:center;
    color:#fff;
    margin-bottom:25px;
}

input,select{
    width:100%;
    padding:15px;
    margin-bottom:18px;
    border:none;
    border-radius:14px;
    font-size:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(135deg,#34d399,#059669);
    color:white;
}

button:disabled{
    opacity:.6;
}

#msg{
    margin-top:18px;
    text-align:center;
    color:white;
}
</style>

</head>
<body>

<div class="container">

<h1>Officer Attendance</h1>

<input type="text" id="name" placeholder="Enter your name">

<select id="status">
    <option value="Present">Present</option>
    <option value="Excused">Excused</option>
</select>

<button id="submitBtn" onclick="addAttendance()">
Submit Attendance
</button>

<div id="msg"></div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbyFyFdRVKfBRVX7a09WZ8h0w8QZ7GE0jrQI7wu3FjjcKDC662OkJgX2nUvnUId72m-S2Q/exec";

async function addAttendance(){

    const name=document.getElementById("name").value.trim();
    const status=document.getElementById("status").value;
    const btn=document.getElementById("submitBtn");
    const msg=document.getElementById("msg");

    if(name===""){
        alert("Please enter your name.");
        return;
    }

    btn.disabled=true;
    btn.innerText="Submitting...";
    msg.innerHTML="";

    const now=new Date();

    const formData=new FormData();

    formData.append("name",name);
    formData.append("status",status);
    formData.append("date",now.toLocaleDateString());
    formData.append("time",now.toLocaleTimeString());

    try{

        const response=await fetch(WEB_APP_URL,{
            method:"POST",
            body:formData
        });

        const result=await response.json();

        if(result.success){

            msg.innerHTML="✅ Attendance Recorded!";
            document.getElementById("name").value="";

        }else{

            msg.innerHTML="❌ "+result.message;

        }

    }catch(err){

        console.error(err);
        msg.innerHTML="❌ "+err.message;

    }

    btn.disabled=false;
    btn.innerText="Submit Attendance";

}

</script>

</body>
</html>
